name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Install stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run luacheck
        run: luacheck . --globals lvim vim

      - name: Run shellcheck
        run: shellcheck bootstrap.sh

      - name: Run markdownlint
        run: markdownlint README.md

  lvim-headless:
    name: LunarVim headless config load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache LunarVim data
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/lunarvim
            ~/.local/share/nvim
            ~/.cache/nvim
          key: lvim-${{ runner.os }}-${{ hashFiles('config.lua') }}
          restore-keys: lvim-${{ runner.os }}-

      - name: Install Neovim 0.9.5
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.9.5

      - name: Install LunarVim
        run: |
          LV_BRANCH='release-1.3/neovim-0.9' bash <(curl -s \
            https://raw.githubusercontent.com/LunarVim/LunarVim/release-1.3/neovim-0.9/utils/installer/install.sh) \
            --install-dependencies -y

      - name: Sync config
        run: make sync

      - name: Test headless config load
        run: |
          ~/.local/bin/lvim --headless -c "lua print('config loaded ok')" -c "q"
        timeout-minutes: 3

  docker-validate:
    name: Docker config validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build validation image
        run: docker build -t lunarvim-config:test .

      - name: Test headless config load
        run: docker run --rm lunarvim-config:test

      - name: Test snacks.nvim loads
        run: |
          docker run --rm lunarvim-config:test \
            /root/.local/bin/lvim --headless \
            -c "lua print('snacks loaded: ' .. tostring(pcall(require, 'snacks')))" -c q
